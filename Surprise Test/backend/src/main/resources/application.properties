# Server Configuration
server.port=8080
server.servlet.context-path=

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/job_tracker_db
spring.datasource.username=root
spring.datasource.password=Akanksha11@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-super-secret-key-change-this-in-production-at-least-256-bits-long
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.jobtracker=DEBUG

# Application Name
spring.application.name=job-application-tracker
